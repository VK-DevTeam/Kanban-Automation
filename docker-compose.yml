version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: asana-trello-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  webhook:
    build: .
    container_name: asana-trello-webhook
    ports:
      - "8000:8000"
    environment:
      - ASANA_ACCESS_TOKEN=${ASANA_ACCESS_TOKEN}
      - ASANA_PROJECT_GID=${ASANA_PROJECT_GID}
      - ASANA_TRIGGER_SECTION_NAME=${ASANA_TRIGGER_SECTION_NAME}
      - ASANA_WEBHOOK_SECRET=${ASANA_WEBHOOK_SECRET}
      - TRELLO_API_KEY=${TRELLO_API_KEY}
      - TRELLO_TOKEN=${TRELLO_TOKEN}
      - TRELLO_TARGET_LIST_ID=${TRELLO_TARGET_LIST_ID}
      - REDIS_URL=redis://redis:6379/0
      - MAX_RETRY_ATTEMPTS=${MAX_RETRY_ATTEMPTS:-3}
      - RETRY_BASE_DELAY_SECONDS=${RETRY_BASE_DELAY_SECONDS:-5}
      - API_TIMEOUT_SECONDS=${API_TIMEOUT_SECONDS:-30}
      - ATTACHMENT_TIMEOUT_SECONDS=${ATTACHMENT_TIMEOUT_SECONDS:-300}
      - DLQ_ALERT_WEBHOOK_URL=${DLQ_ALERT_WEBHOOK_URL}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PROCESS_TYPE=webhook
    depends_on:
      redis:
        condition: service_healthy
    command: supervisord -c /etc/supervisor/conf.d/supervisord.conf

  worker:
    build: .
    container_name: asana-trello-worker
    environment:
      - ASANA_ACCESS_TOKEN=${ASANA_ACCESS_TOKEN}
      - ASANA_PROJECT_GID=${ASANA_PROJECT_GID}
      - ASANA_TRIGGER_SECTION_NAME=${ASANA_TRIGGER_SECTION_NAME}
      - ASANA_WEBHOOK_SECRET=${ASANA_WEBHOOK_SECRET}
      - TRELLO_API_KEY=${TRELLO_API_KEY}
      - TRELLO_TOKEN=${TRELLO_TOKEN}
      - TRELLO_TARGET_LIST_ID=${TRELLO_TARGET_LIST_ID}
      - REDIS_URL=redis://redis:6379/0
      - MAX_RETRY_ATTEMPTS=${MAX_RETRY_ATTEMPTS:-3}
      - RETRY_BASE_DELAY_SECONDS=${RETRY_BASE_DELAY_SECONDS:-5}
      - API_TIMEOUT_SECONDS=${API_TIMEOUT_SECONDS:-30}
      - ATTACHMENT_TIMEOUT_SECONDS=${ATTACHMENT_TIMEOUT_SECONDS:-300}
      - DLQ_ALERT_WEBHOOK_URL=${DLQ_ALERT_WEBHOOK_URL}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PROCESS_TYPE=worker
    depends_on:
      redis:
        condition: service_healthy
    command: supervisord -c /etc/supervisor/conf.d/supervisord.conf

volumes:
  redis_data:
